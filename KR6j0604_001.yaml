body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護等奉詔譯如是我聞一時世尊遊行到於摩伽陀國菴沒羅林住韋提呬山帝釋巖中爾時帝釋天主來詣佛所前白佛言世尊我有怖畏謂阿修羅於長夜中來相嬈亂阿修羅者我之怨敵惟願世尊為我宣說擁護法門爾時世尊告帝釋天主言天主我有陀羅尼名施一切無畏此法善能作一切事能除一切病復能禁止一切傍生能解一切怨縛若有阿修羅及諸羅剎部多一切邪異乃至一切諸惡鬼神之所執持謂邪惡所執天執龍執夜叉執乾闥婆執緊那羅執頻那夜迦執母鬼等執皆悉消滅又復若有吸精氣者食華鬘者障産生者食不淨者皆悉除遣又復若有一切瘧疾及風黃痰癊等諸疾病亦悉消散一切鬪戰諍訟陳敵皆悉破壞我今為汝說此陀羅尼而作擁護陀羅尼曰怛𭔞切身下同他引一句伊抳二彌抳三鉢囉二合彌抳四鉢囉二合彌抳哩五吾哩六謨引里七謨引瑟恥二合八那胝九嚩胝十珂囉胝十一珂囉尼十二誐拏尼十三誐拏鉢囉二合誐尼十四誐𧹞誐尼引十五謨引尼引十六鉢囉二合底謨引尼引十七哥引里十八鉢囉二合哥引里引十九贊抳二十鉢囉二合底贊抳二十一尾詣引二十二鉢囉二合底尾詣引二十三阿底尾詣引二十四蘇引那引二十五吾引拏引二十六謨引訶引二十七鉢囉二合謨引訶引二十八謨引拏引二十九鉢囉二合謨引拏引三十那引設儞三十一鉢囉二合那引設儞三十二馱引嚩儞三十三鉢囉二合馱引嚩儞三十四嚩洛誐二合儞三十五鉢囉二合嚩洛誐二合儞三十六涅哩二合多儞三十七鉢囉二合涅哩二合多儞三十八骨嚕二合達儞三十九阿底骨嚕二合引達儞四十賀那賀那四十一尾賀那尾賀那四十二薩哩嚩二合訥瑟吒二合鉢囉二合訥瑟吒二合那引設野四十三薩哩嚩二合跋野鉢囉二合那四十四犖力角切下同叉犖叉𤚥引四十五薩哩嚩二合咩引提跋野四十六訥瑟吒二合設咄嚕二合怛塞哥二合囉能瑟吒嚕三合引波捺囉二合吠引毗藥二合四十七薩波哩嚩囕四十八詰禰詰禰四十九薩哩嚩二合薩埵呬帝引五十囉帝引那莫薩哩嚩二合沒馱引喃引莎引賀引五十一此施一切無畏陀羅尼若持誦者當以淨線加持四十一遍繫於頂上或加持白芥子或加持牛黃隨諸所用即得成就又復若以塗香加持一遍塗自身分即如被甲胄勇猛無畏不為刀傷不為毒中又復不為一日二日乃至七日等諸瘧疾之所纏縛不為火焚不為水溺不為呪害不為鬼魅不為病惱不於一切夭橫中死又此陀羅尼善能作諸相應事業一切成就法皆悉和合作諸成就事無不成就者他所作法皆能制止不為他縛能破邪明自法隨轉一切魔障皆能除遣一切執魅悉能解散若有所執不能除者頭破作七分如阿梨樹枝爾時帝釋天主聞佛所說踊躍歡喜作禮而去
